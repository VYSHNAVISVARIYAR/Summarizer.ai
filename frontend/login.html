<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Summarizer.ai - Login</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary-container min-h-screen flex flex-col overflow-x-hidden">

<!-- Ambient Background Light Leaks -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] light-leak rounded-full"></div>
    <div class="absolute -bottom-[20%] -right-[10%] w-[70%] h-[70%] light-leak rounded-full"></div>
</div>

<main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md flex flex-col items-center">
        <!-- Logo Section -->
        <div class="mb-12 flex flex-col items-center gap-4">
            <div class="w-16 h-16 rounded-xl bg-surface-container-highest flex items-center justify-center shadow-[0_0_20px_rgba(129,236,255,0.1)] border border-outline-variant/20">
                <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">science</span>
            </div>
            <div class="text-center">
                <h2 class="font-headline font-black text-2xl tracking-tight text-on-surface uppercase leading-none">Summarizer.ai</h2>
                <p class="font-label text-[10px] tracking-[0.3em] text-primary uppercase mt-1">AI research paper summarizer and Insight extractor</p>
            </div>
        </div>

        <!-- Login Card -->
        <div class="glass-card w-full p-8 rounded-2xl border border-outline-variant/10 shadow-2xl">
            <div class="mb-8">
                <h1 class="font-headline font-black text-3xl text-white tracking-tight mb-2">Welcome Back</h1>
                <p class="text-on-surface-variant font-body text-sm">Login to continue analyzing research papers</p>
            </div>
            
            <form class="space-y-6" id="loginForm">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant uppercase ml-1">Email Address</label>
                    <div class="relative">
                        <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline/50 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all font-body" id="email" placeholder="researcher@synth.ai" type="email" required/>
                    </div>
                </div>
                
                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-end px-1">
                        <label class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant uppercase">Password</label>
                        <a class="font-label text-[9px] tracking-[0.1em] text-primary/70 uppercase hover:text-primary transition-colors" href="#">Recover?</a>
                    </div>
                    <div class="relative">
                        <input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline/50 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all font-body" id="password" placeholder="••••••••" type="password" required/>
                    </div>
                </div>
                
                <!-- Login Button -->
                <div class="pt-4">
                    <button class="btn-gradient w-full py-4 rounded-full font-label text-sm font-bold tracking-[0.2em] text-white uppercase shadow-[0_0_25px_rgba(255,113,108,0.2)] hover:shadow-[0_0_35px_rgba(129,236,255,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="loginBtn" type="submit">
                        <span class="btn-text">Login</span>
                        <span class="btn-loader hidden">...</span>
                    </button>
                </div>
            </form>

        </div>

        <!-- Footer Link -->
        <div class="mt-8 text-center">
            <p class="font-body text-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="signup.html">Sign up</a>
            </p>
        </div>
    </div>
</main>

<!-- Footer Component -->
<footer class="w-full py-8 flex flex-col items-center gap-4 mt-auto">
    <p class="text-[10px] font-medium tracking-[0.3em] uppercase font-label text-[#81ecff]">© 2024 SUMMARIZER.AI. LAB-SPEC 0.1</p>
    <div class="flex gap-6">
        <a class="text-[10px] font-medium tracking-[0.3em] uppercase font-label text-[#40485d] hover:text-[#81ecff] transition-all opacity-80 hover:opacity-100" href="https://github.com/VYSHNAVISVARIYAR/Summarizer.ai.git" target="_blank">GitHub Repository</a>
        <a class="text-[10px] font-medium tracking-[0.3em] uppercase font-label text-[#40485d] hover:text-[#81ecff] transition-all opacity-80 hover:opacity-100" href="#">Privacy Protocol</a>
        <a class="text-[10px] font-medium tracking-[0.3em] uppercase font-label text-[#40485d] hover:text-[#81ecff] transition-all opacity-80 hover:opacity-100" href="#">Security</a>
        <a class="text-[10px] font-medium tracking-[0.3em] uppercase font-label text-[#40485d] hover:text-[#81ecff] transition-all opacity-80 hover:opacity-100" href="#">Terms</a>
    </div>
</footer>

<div id="toast"></div>

<script src="auth.js"></script>

</body>
</html>
